# MinIO S3 API 리버스 프록시
# 집 GPU 워커가 외부에서 MinIO에 접근하고, 시청자가 영상을 받아갈 수 있도록
# minio.mytube.it.com → 내부 MinIO(127.0.0.1:9000) 로 프록시한다.
#
# 설치 (VM에서):
#   sudo cp nginx-minio.conf /etc/nginx/sites-available/minio
#   sudo ln -s /etc/nginx/sites-available/minio /etc/nginx/sites-enabled/minio
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d minio.mytube.it.com   # 이 블록에 443/TLS 자동 추가
#
# 주의: MinIO 콘솔(9001)은 노출하지 않는다. S3 API(9000)만 프록시한다.

server {
    listen 80;
    server_name minio.mytube.it.com;

    # 원본 영상은 최대 2GB까지 업로드되므로 본문 크기 제한을 풀고 버퍼링을 끈다.
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;

    # 대용량 업/다운로드를 위한 넉넉한 타임아웃
    proxy_connect_timeout 300;
    proxy_send_timeout    300;
    proxy_read_timeout    300;

    location / {
        proxy_pass http://127.0.0.1:9000;

        # SigV4 서명은 Host 헤더를 포함하므로 원래 Host를 그대로 전달해야 한다.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 영상 탐색(seek)을 위한 Range 요청 통과
        proxy_set_header Range             $http_range;
        proxy_set_header If-Range          $http_if_range;

        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }
}
