name: Deploy to Oracle Cloud VM

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Source
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build -x test

    - name: Restart Application
      run: |
        mkdir -p /home/ubuntu/app
        cp build/libs/demo-0.0.1-SNAPSHOT.jar /home/ubuntu/app/demo.jar
        sudo systemctl restart youtube-clone
        sleep 5
        echo "Application started. PID: $(pgrep -f app/demo.jar || true)"
