name: Deploy to Oracle Cloud VM

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Source
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build -x test

    - name: Restart Application
      run: |
        mkdir -p /home/ubuntu/app
        cp build/libs/demo-0.0.1-SNAPSHOT.jar /home/ubuntu/app/demo.jar

        CURRENT_PID=$(pgrep -f app/demo.jar || true)
        if [ -z "$CURRENT_PID" ]; then
            echo "No running application found."
        else
            echo "Killing running application with PID: $CURRENT_PID"
            kill -9 $CURRENT_PID
            sleep 3
        fi

        nohup env DB_URL=${{ secrets.DB_URL }} \
                  DB_USERNAME=${{ secrets.DB_USERNAME }} \
                  DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              java -jar /home/ubuntu/app/demo.jar > /home/ubuntu/app.log 2>&1 &
        sleep 5
        echo "Application started. PID: $(pgrep -f app/demo.jar || true)"
