services:
  minio:
    image: minio/minio
    container_name: minio
    # 외부에는 nginx(minio.mytube.it.com)로만 노출하고, 포트 자체는 localhost에만 바인딩한다.
    # 콘솔(9001)은 외부 노출하지 않으며 필요 시 SSH 터널로 접근한다.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  app:
    build: .
    network_mode: "host"
    depends_on:
      - minio
    environment:
      DB_URL: "${DB_URL:-jdbc:mariadb://localhost:3306/mytube}"
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      APP_BASE_URL: https://mytube.it.com
      R2_ENDPOINT: http://localhost:9000
      R2_ACCESS_KEY: ${MINIO_ROOT_USER}
      R2_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      R2_BUCKET: mytube-videos
      R2_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    restart: unless-stopped
