spring.application.name=demo
spring.config.import=optional:classpath:application-local.properties

# 파일 업로드 경로 설정
file.upload-dir=uploads
file.video-dir=uploads/videos
file.thumbnail-dir=uploads/thumbnails

# 파일 업로드 용량 제한 (최대 2000MB)
spring.servlet.multipart.max-file-size=2000MB
spring.servlet.multipart.max-request-size=2000MB

# MariaDB 연결 설정 (포트는 충돌 피해서 바꾼 3307 사용)
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3307/mytube}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

# JPA 하이버네이트 설정 (테이블 자동 생성 및 SQL 로그 출력)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true