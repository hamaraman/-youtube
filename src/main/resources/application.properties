spring.application.name=demo
spring.mvc.favicon.enabled=false
spring.config.import=optional:classpath:application-local.properties


# 파일 업로드 경로 설정
file.upload-dir=uploads
file.video-dir=uploads/videos
file.thumbnail-dir=uploads/thumbnails

# 파일 업로드 용량 제한 (최대 2000MB)
spring.servlet.multipart.max-file-size=2000MB
spring.servlet.multipart.max-request-size=2000MB
server.tomcat.max-http-form-post-size=-1

# MariaDB 연결 설정 (포트는 충돌 피해서 바꾼 3307 사용)
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3307/mytube}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

# JPA 하이버네이트 설정 (테이블 자동 생성 및 SQL 로그 출력)
spring.jpa.hibernate.ddl-auto=validate

# 세션 DB 저장 (재배포 후에도 세션 유지)
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT 설정
jwt.secret=${JWT_SECRET:demo-app-jwt-secret-key-must-be-32chars!}