spring.application.name=demo
spring.mvc.favicon.enabled=false
spring.config.import=optional:classpath:application-local.properties


# 파일 업로드 경로 설정
file.upload-dir=uploads
file.video-dir=uploads/videos
file.thumbnail-dir=uploads/thumbnails

# 파일 업로드 용량 제한 (최대 2000MB)
spring.servlet.multipart.max-file-size=2000MB
spring.servlet.multipart.max-request-size=2000MB
server.tomcat.max-http-form-post-size=-1

# MariaDB 연결 설정 (포트는 충돌 피해서 바꾼 3307 사용)
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/mytube}
spring.datasource.username=${DB_USERNAME:root}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.password=my_password123
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
jwt.secret=my-very-long-and-secure-jwt-secret-key-1234567890

# JPA 하이버네이트 설정 (테이블 자동 생성 및 SQL 로그 출력)
spring.jpa.hibernate.ddl-auto=update

# 세션 DB 저장 (재배포 후에도 세션 유지)
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.jpa.show-sql=false

# JWT 설정 (환경변수 JWT_SECRET 필수 — 32자 이상의 안전한 키를 사용하세요)
jwt.secret=${JWT_SECRET}

# 앱 기본 URL (이메일 링크 생성에 사용)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Cloudflare R2 (S3 호환 스토리지)
r2.endpoint=${R2_ENDPOINT:}
r2.access-key=${R2_ACCESS_KEY:}
r2.secret-key=${R2_SECRET_KEY:}
r2.bucket=${R2_BUCKET:}
r2.public-url=${R2_PUBLIC_URL:}

# 보안 설정 (환경변수 ADMIN_PASSWORD 필수 — 강력한 비밀번호를 사용하세요)
admin.password=${ADMIN_PASSWORD}
allowed.origins=${ALLOWED_ORIGINS:http://localhost:8080,https://mytube.it.com,https://www.mytube.it.com}

# FFmpeg 하드웨어 가속 (none / nvenc / qsv / amf)
ffmpeg.hw-accel=${FFMPEG_HW_ACCEL:none}

# 동시 트랜스코딩 작업 수 (코어 수에 맞춰 조정. 1코어=1, A1 4코어=2 권장)
ffmpeg.batch-concurrency=${FFMPEG_BATCH_CONCURRENCY:2}

# 트랜스코딩 모드 (server: 서버 CPU로 직접 변환 / worker: 로컬 GPU 워커가 변환)
# worker 모드는 R2가 설정돼 있어야 동작하며, 아니면 자동으로 server 모드로 폴백한다.
transcode.mode=${TRANSCODE_MODE:server}

# 로컬 GPU 워커 인증 토큰 (worker 모드에서 필수. 워커는 X-Worker-Token 헤더로 인증)
worker.token=${WORKER_TOKEN:}

# Gmail SMTP 설정
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true