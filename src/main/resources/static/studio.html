<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube - 크리에이터 스튜디오</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet"
    />
    <script src="theme.js"></script>
    <link rel="stylesheet" href="style.css?v=2" />
    <style>
        .studio-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }
        .studio-stat-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .studio-stat-label {
            font-size: 13px;
            color: #888;
        }
        .studio-stat-value {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
        }
        .studio-chart-wrap {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 20px 24px 24px;
        }
        /* 탭 */
        .studio-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 1px solid #2a2a2a;
        }
        .studio-tab-btn {
            padding: 10px 22px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: -1px;
            transition: color 0.15s, border-color 0.15s;
            font-family: inherit;
        }
        .studio-tab-btn:hover { color: #fff; }
        .studio-tab-btn.is-active {
            color: #fff;
            border-bottom-color: #3ea6ff;
        }
        .studio-tab-panel { display: none; }
        .studio-tab-panel.is-active { display: block; }
        .studio-chart-empty {
            text-align: center;
            padding: 60px 0;
            color: #666;
            font-size: 14px;
        }
        @media (max-width: 700px) {
            .studio-stats-grid { grid-template-columns: repeat(2, 1fr); }
            .studio-tab-btn { padding: 10px 16px; font-size: 13px; }
        }
    </style>
</head>
<body data-page="studio">
<header class="topbar">
    <div class="topbar-left">
        <a href="index.html" class="logo-wrap" aria-label="MyTube 홈">
            <span class="logo-badge">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
                    <rect x="4" y="7" width="16" height="10" rx="2" stroke="white" stroke-width="1.4"/>
                    <rect x="2" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="2" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <path d="M10.5 10l4 2-4 2v-4z" fill="white"/>
                </svg>
            </span>
            <span class="logo-text">MY</span>
        </a>
    </div>

    <div class="topbar-center">
        <form class="search-form" onsubmit="return false;">
            <input type="text" placeholder="검색" aria-label="검색" />
            <button type="submit" class="search-btn" aria-label="검색 버튼">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10 4a6 6 0 1 0 3.87 10.58l4.27 4.27 1.41-1.41-4.27-4.27A6 6 0 0 0 10 4Zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"></path>
                </svg>
            </button>
        </form>
    </div>

    <div class="topbar-right">
        <a href="upload.html" class="icon-btn" aria-label="업로드">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M11 6h2v5h5v2h-5v5h-2v-5H6v-2h5V6Z"></path>
            </svg>
        </a>
        <div class="notif-wrap" id="notifWrap">
            <button class="icon-btn notif-btn" id="notifBtn" aria-label="알림">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6v-5a7 7 0 1 0-14 0v5l-2 2v1h18v-1l-2-2Z"/></svg>
                <span class="notif-badge" id="notifBadge" style="display:none"></span>
            </button>
            <div class="notif-dropdown" id="notifDropdown" style="display:none">
                <div class="notif-header"><span>알림</span><button class="notif-read-all" id="notifReadAll">모두 읽음</button></div>
                <div class="notif-list" id="notifList"></div>
            </div>
        </div>
        <a href="channel.html" class="profile" aria-label="내 채널" id="studioHeaderAvatar">U</a>
    </div>
</header>

<div class="studio-wrap">
    <div class="studio-header">
        <h1>크리에이터 스튜디오</h1>
        <a href="upload.html" class="studio-upload-btn">영상 업로드</a>
    </div>

    <div id="studioStats" class="studio-stats-grid"></div>

    <div class="studio-tabs">
        <button class="studio-tab-btn is-active" data-tab="analytics">채널 분석</button>
        <button class="studio-tab-btn" data-tab="videos">내 영상</button>
    </div>

    <div id="studioTabAnalytics" class="studio-tab-panel is-active">
        <div id="studioChart" class="studio-chart-wrap"></div>
    </div>

    <div id="studioTabVideos" class="studio-tab-panel">
        <div id="studioVideoList" class="studio-list"></div>
    </div>
</div>

<script src="auth.js?v=11"></script>
<script src="script.js?v=10"></script>
</body>
</html>
