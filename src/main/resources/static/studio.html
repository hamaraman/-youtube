    <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube - 크리에이터 스튜디오</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet"
    />
    <script src="theme.js"></script>
    <link rel="stylesheet" href="style.css?v=5" />
    <style>
        .studio-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }
        .studio-stat-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .studio-stat-label {
            font-size: 13px;
            color: #888;
        }
        .studio-stat-value {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
        }
        .studio-chart-wrap {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 20px 24px 24px;
        }
        /* 탭 */
        .studio-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 1px solid #2a2a2a;
        }
        .studio-tab-btn {
            padding: 10px 22px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: -1px;
            transition: color 0.15s, border-color 0.15s;
            font-family: inherit;
        }
        .studio-tab-btn:hover { color: #fff; }
        .studio-tab-btn.is-active {
            color: #fff;
            border-bottom-color: #3ea6ff;
        }
        .studio-tab-panel { display: none; }
        .studio-tab-panel.is-active { display: block; }
        .studio-chart-empty {
            text-align: center;
            padding: 60px 0;
            color: #666;
            font-size: 14px;
        }
        @media (max-width: 700px) {
            .studio-stats-grid { grid-template-columns: repeat(2, 1fr); }
            .studio-tab-btn { padding: 10px 16px; font-size: 13px; }
        }
        .studio-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .studio-toolbar-left, .studio-toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .studio-search {
            width: 320px;
            max-width: 100%;
            height: 42px;
            border-radius: 999px;
            border: 1px solid #303030;
            background: #121212;
            color: #fff;
            padding: 0 16px;
            outline: none;
        }
        .studio-filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .studio-filter-btn {
            height: 38px;
            padding: 0 14px;
            border-radius: 999px;
            border: 1px solid #303030;
            background: #202020;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
        }
        .studio-filter-btn.is-active { background: #fff; color: #111; border-color: #fff; font-weight: 700; }
        .studio-sort {
            height: 40px;
            border-radius: 999px;
            border: 1px solid #303030;
            background: #121212;
            color: #fff;
            padding: 0 14px;
            outline: none;
        }
        .studio-table {
            background: #181818;
            border: 1px solid #272727;
            border-radius: 20px;
            overflow: hidden;
        }
        .studio-head, .studio-row {
            display: grid;
            grid-template-columns: minmax(180px, 1fr) 70px 64px 64px 64px 80px 150px;
            gap: 14px;
            align-items: center;
            padding: 16px 18px;
        }
        .studio-head {
            background: #202020;
            color: #aaa;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .studio-row {
            border-top: 1px solid #242424;
            transition: background 0.18s ease, box-shadow 0.18s ease;
        }
        .studio-row:hover { background: #202020; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03); }
        .studio-row:hover .studio-video-title { color: #fff; }
        .studio-row:hover .studio-thumb { transform: translateY(-1px); border-color: #3a3a3a; }
        .studio-row:hover .studio-action-btn { background: #2a2a2a; }
        .studio-video-cell { display: flex; gap: 14px; min-width: 0; }
        .studio-thumb {
            width: 120px;
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            background: #111;
            border: 1px solid transparent;
            transition: transform 0.18s ease, border-color 0.18s ease;
        }
        .studio-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .studio-duration {
            position: absolute;
            right: 8px; bottom: 8px;
            background: rgba(0,0,0,0.85);
            color: #fff; font-size: 12px;
            padding: 2px 6px; border-radius: 6px;
        }
        .studio-video-info { min-width: 0; overflow: hidden; }
        .studio-video-title {
            margin: 0 0 8px;
            font-size: 16px;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            transition: color 0.18s ease;
        }
        .studio-video-meta, .studio-video-desc {
            margin: 0;
            color: #aaa;
            font-size: 13px;
            line-height: 1.55;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .studio-video-desc { margin-top: 6px; }
        .studio-cell-text, .studio-number { font-size: 14px; color: #f1f1f1; }
        .studio-status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 30px;
            padding: 0 12px;
            border-radius: 999px;
            background: #222;
            border: 1px solid #303030;
            font-size: 13px;
        }
        .studio-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .studio-action-btn {
            height: 34px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid #303030;
            background: #202020;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
        }
        .studio-action-btn:hover { border-color: #3b3b3b; transform: translateY(-1px); }
        .studio-action-btn.delete { background: #2a1616; border-color: #4c2424; color: #ffb4b4; }
        .studio-action-btn.delete:hover { background: #3a1c1c; border-color: #6a2e2e; }
        .channel-empty-state {
            margin-top: 22px;
            padding: 46px 24px;
            border: 1px solid #272727;
            border-radius: 22px;
            background: linear-gradient(180deg, #181818, #151515);
            text-align: center;
        }
        .channel-empty-icon {
            width: 74px; height: 74px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: #202020;
            border: 1px solid #2e2e2e;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .channel-empty-icon svg { width: 34px; height: 34px; fill: #9aa0a6; }
        .channel-empty-title { margin: 0 0 10px; font-size: 22px; color: #fff; }
        .channel-empty-text { margin: 0; color: #9aa0a6; font-size: 15px; line-height: 1.75; }
        .channel-empty-actions { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 22px; }
        .channel-empty-btn {
            min-width: 120px; height: 40px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid #303030;
            background: #202020;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 14px;
        }
        .channel-empty-btn.primary { background: #fff; color: #111; border-color: #fff; font-weight: 700; }
        @media (max-width: 900px) {
            .studio-table { overflow-x: auto; }
            .studio-head, .studio-row { min-width: 1080px; }
        }
        /* ── 통합 분석 패널 ── */
        .studio-stats-grid {
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        }
        #studioAnalyticsExtra { margin-top: 20px; display: grid; gap: 16px; }
        .sa-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .sa-panel {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 20px 24px;
        }
        .sa-panel-title {
            margin: 0 0 16px;
            font-size: 12px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .sa-rank-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #1e1e1e;
        }
        .sa-rank-row:last-child { border-bottom: none; }
        .sa-rank-num {
            width: 22px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: #3ea6ff;
            flex-shrink: 0;
        }
        .sa-rank-title {
            flex: 1;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #e0e0e0;
        }
        .sa-rank-views { font-size: 13px; color: #888; flex-shrink: 0; }
        .sa-bar-row { margin-bottom: 14px; }
        .sa-bar-row:last-child { margin-bottom: 0; }
        .sa-bar-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .sa-bar-meta span { color: #aaa; }
        .sa-bar-meta strong { color: #fff; }
        .sa-bar-track {
            height: 6px;
            background: #222;
            border-radius: 999px;
            overflow: hidden;
        }
        .sa-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3ea6ff, #60b8ff);
            border-radius: 999px;
            transition: width 0.5s ease;
        }
        .sa-engagement {
            display: flex;
            gap: 0;
            flex-wrap: wrap;
        }
        .sa-engagement-item {
            flex: 1;
            min-width: 120px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 4px 20px 4px 0;
            border-right: 1px solid #222;
        }
        .sa-engagement-item:last-child { border-right: none; padding-right: 0; }
        .sa-engagement-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.4px; }
        .sa-engagement-value { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
        .sa-empty { color: #444; font-size: 14px; text-align: center; padding: 24px 0; }
        @media (max-width: 700px) {
            .sa-grid { grid-template-columns: 1fr; }
            .sa-engagement-item { border-right: none; border-bottom: 1px solid #222; padding: 12px 0; }
            .sa-engagement-item:last-child { border-bottom: none; }
        }
        /* ── 날짜별 조회수 차트 ── */
        .studio-chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .studio-chart-title {
            font-size: 14px;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .studio-period-group {
            display: flex;
            gap: 6px;
        }
        .studio-period-btn {
            height: 30px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid #303030;
            background: #202020;
            color: #aaa;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .studio-period-btn:hover { color: #fff; border-color: #444; }
        .studio-period-btn.is-active { background: #3ea6ff; border-color: #3ea6ff; color: #fff; }
        .studio-chart-body { min-height: 120px; }
        .studio-mobile-stats { display: none; }
        @media (max-width: 640px) {
            .studio-table { overflow-x: unset; border-radius: 14px; }
            .studio-head { display: none; }
            .studio-row {
                display: flex;
                flex-direction: column;
                gap: 0;
                padding: 14px;
                min-width: unset;
            }
            .studio-video-cell { margin-bottom: 10px; }
            .studio-thumb { width: 90px; }
            .studio-cell-text,
            .studio-number,
            .studio-status-cell { display: none; }
            .studio-mobile-stats {
                display: flex;
                align-items: center;
                gap: 8px;
                flex-wrap: wrap;
                margin-bottom: 10px;
                font-size: 13px;
                color: #aaa;
            }
            .studio-mobile-dot { color: #444; }
            .studio-mobile-stats .studio-status-badge {
                font-size: 12px;
                padding: 0 8px;
                min-height: 24px;
                margin-left: auto;
            }
            .studio-actions { flex-wrap: wrap; gap: 6px; }
        }
    </style>
</head>
<body data-page="studio">
<header class="topbar">
    <div class="topbar-left">
        <a href="index.html" class="logo-wrap" aria-label="MyTube 홈">
            <span class="logo-badge">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
                    <rect x="4" y="7" width="16" height="10" rx="2" stroke="white" stroke-width="1.4"/>
                    <rect x="2" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="2" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <path d="M10.5 10l4 2-4 2v-4z" fill="white"/>
                </svg>
            </span>
            <span class="logo-text">MY</span>
        </a>
    </div>

    <div class="topbar-center">
        <form class="search-form" onsubmit="return false;">
            <input type="text" placeholder="검색" aria-label="검색" />
            <button type="submit" class="search-btn" aria-label="검색 버튼">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10 4a6 6 0 1 0 3.87 10.58l4.27 4.27 1.41-1.41-4.27-4.27A6 6 0 0 0 10 4Zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"></path>
                </svg>
            </button>
        </form>
    </div>

    <div class="topbar-right">
        <a href="upload.html" class="icon-btn" aria-label="업로드">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M11 6h2v5h5v2h-5v5h-2v-5H6v-2h5V6Z"></path>
            </svg>
        </a>
        <div class="notif-wrap" id="notifWrap">
            <button class="icon-btn notif-btn" id="notifBtn" aria-label="알림">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6v-5a7 7 0 1 0-14 0v5l-2 2v1h18v-1l-2-2Z"/></svg>
                <span class="notif-badge" id="notifBadge" style="display:none"></span>
            </button>
            <div class="notif-dropdown" id="notifDropdown" style="display:none">
                <div class="notif-header"><span>알림</span><button class="notif-read-all" id="notifReadAll">모두 읽음</button></div>
                <div class="notif-list" id="notifList"></div>
            </div>
        </div>
        <a href="channel.html" class="profile" aria-label="내 채널" id="studioHeaderAvatar">U</a>
    </div>
</header>

<div class="studio-wrap">
    <div class="studio-header">
        <h1>크리에이터 스튜디오</h1>
        <a href="upload.html" class="studio-upload-btn">영상 업로드</a>
    </div>

    <div id="studioStats" class="studio-stats-grid"></div>

    <div class="studio-tabs">
        <button class="studio-tab-btn is-active" data-tab="analytics">채널 분석</button>
        <button class="studio-tab-btn" data-tab="videos">내 영상</button>
    </div>

    <div id="studioTabAnalytics" class="studio-tab-panel is-active">
        <div id="studioChart" class="studio-chart-wrap"></div>
        <div id="studioAnalyticsExtra"></div>
    </div>

    <div id="studioTabVideos" class="studio-tab-panel">
        <section class="studio-toolbar">
            <div class="studio-toolbar-left">
                <input type="text" id="channelSearchInput" class="studio-search" placeholder="영상 검색" aria-label="영상 검색" />
                <div class="studio-filter-group" id="channelVisibilityFilter">
                    <button type="button" class="studio-filter-btn is-active" data-filter="전체">전체</button>
                    <button type="button" class="studio-filter-btn" data-filter="공개">공개</button>
                    <button type="button" class="studio-filter-btn" data-filter="비공개">비공개</button>
                    <button type="button" class="studio-filter-btn" data-filter="일부 공개">일부 공개</button>
                </div>
            </div>
            <div class="studio-toolbar-right">
                <select id="channelSortSelect" class="studio-sort" aria-label="정렬">
                    <option value="latest">최신순</option>
                    <option value="oldest">오래된순</option>
                    <option value="views">조회수순</option>
                    <option value="likes">좋아요순</option>
                    <option value="comments">댓글순</option>
                    <option value="title">제목순</option>
                </select>
            </div>
        </section>
        <section class="studio-table" id="studioManageTable">
            <div class="studio-head">
                <div>영상</div>
                <div>카테고리</div>
                <div>조회수</div>
                <div>좋아요</div>
                <div>댓글</div>
                <div>상태</div>
                <div>관리</div>
            </div>
            <div id="channelManageList"></div>
        </section>
        <section class="channel-empty-state" id="channelEmptyState" hidden>
            <div class="channel-empty-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M17 10.5V6a2 2 0 0 0-2-2H5A2 2 0 0 0 3 6v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4.5l4 4v-11l-4 4Z"></path>
                </svg>
            </div>
            <h3 class="channel-empty-title" id="channelEmptyTitle">아직 업로드한 영상이 없습니다</h3>
            <p class="channel-empty-text" id="channelEmptyText">첫 영상을 업로드해서 내 채널을 채워보자.</p>
            <div class="channel-empty-actions">
                <a href="upload.html" class="channel-empty-btn primary">영상 업로드</a>
                <a href="index.html" class="channel-empty-btn">홈으로 가기</a>
            </div>
        </section>
    </div>
</div>

<script src="auth.js?v=12"></script>
<script src="script.js?v=23"></script>
</body>
</html>
