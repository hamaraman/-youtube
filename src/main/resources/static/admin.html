<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 패널</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body { background: #0f0f0f; color: #f1f1f1; }

        .admin-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px 60px;
        }

        .admin-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #fff;
        }

        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid #272727;
            padding-bottom: 0;
        }

        .tab-btn {
            padding: 8px 18px 10px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .tab-btn.active {
            color: #fff;
            border-bottom-color: #fff;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 10px 12px;
            background: #181818;
            color: #aaa;
            font-weight: 600;
            border-bottom: 1px solid #272727;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #1e1e1e;
            vertical-align: middle;
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tr:hover td { background: #161616; }

        .btn-del {
            padding: 4px 12px;
            background: #c00;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-del:hover { background: #e00; }

        .count-badge {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 12px;
        }

        .empty-msg {
            padding: 40px;
            text-align: center;
            color: #555;
            font-size: 14px;
        }

        #authWall {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            font-size: 15px;
            color: #888;
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="topbar-left">
        <a href="index.html" class="logo-wrap" aria-label="MyTube 홈">
            <span class="logo-badge">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
                    <rect x="4" y="7" width="16" height="10" rx="2" stroke="white" stroke-width="1.4"/>
                    <rect x="2" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="2" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <path d="M10.5 10l4 2-4 2v-4z" fill="white"/>
                </svg>
            </span>
            <span class="logo-text">MY</span>
        </a>
    </div>
    <div class="topbar-center"></div>
    <div class="topbar-right" id="headerRight"></div>
</header>

<div id="authWall">확인 중...</div>

<div class="admin-wrap" id="adminContent" style="display:none">
    <div class="admin-title">관리자 패널</div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('videos')">영상 관리</button>
        <button class="tab-btn" onclick="switchTab('users')">회원 관리</button>
    </div>

    <!-- 영상 관리 -->
    <div class="tab-panel active" id="tab-videos">
        <div class="count-badge" id="videoCount"></div>
        <div id="videoTableWrap"></div>
    </div>

    <!-- 회원 관리 -->
    <div class="tab-panel" id="tab-users">
        <div class="count-badge" id="userCount"></div>
        <div id="userTableWrap"></div>
    </div>
</div>

<script>
    let currentTab = 'videos';

    async function init() {
        const res = await fetch('/api/me');
        const data = await res.json();
        if (!data.loggedIn || data.user?.username !== 'admin') {
            document.getElementById('authWall').textContent = '관리자 계정으로 로그인해야 합니다.';
            return;
        }
        document.getElementById('authWall').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        loadVideos();
        loadUsers();
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach((btn, i) => {
            btn.classList.toggle('active', ['videos', 'users'][i] === tab);
        });
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
    }

    async function loadVideos() {
        const res = await fetch('/api/admin/videos');
        const videos = await res.json();
        document.getElementById('videoCount').textContent = `총 ${videos.length}개`;

        if (videos.length === 0) {
            document.getElementById('videoTableWrap').innerHTML = '<div class="empty-msg">영상이 없습니다.</div>';
            return;
        }

        const rows = videos.map(v => `
            <tr id="vrow-${v.id}">
                <td style="color:#888;width:48px">${v.id}</td>
                <td title="${v.title}">${v.title}</td>
                <td>${v.channel}</td>
                <td>${v.category}</td>
                <td style="color:#888">${v.ownerId || '-'}</td>
                <td style="color:#888">${v.visibility}</td>
                <td><button class="btn-del" onclick="deleteVideo(${v.id})">삭제</button></td>
            </tr>
        `).join('');

        document.getElementById('videoTableWrap').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>제목</th><th>채널</th><th>카테고리</th>
                        <th>소유자 ID</th><th>공개</th><th></th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    async function loadUsers() {
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        document.getElementById('userCount').textContent = `총 ${users.length}명`;

        if (users.length === 0) {
            document.getElementById('userTableWrap').innerHTML = '<div class="empty-msg">회원이 없습니다.</div>';
            return;
        }

        const rows = users.map(u => `
            <tr id="urow-${u.id}">
                <td style="color:#888;width:48px">${u.id}</td>
                <td>${u.username}</td>
                <td>${u.nickname}</td>
                <td>${u.channelName}</td>
                <td style="color:#888">${u.email}</td>
                <td>${u.username === 'admin' ? '' : `<button class="btn-del" onclick="deleteUser(${u.id}, '${u.username}')">삭제</button>`}</td>
            </tr>
        `).join('');

        document.getElementById('userTableWrap').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>아이디</th><th>닉네임</th>
                        <th>채널명</th><th>이메일</th><th></th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    async function deleteVideo(id) {
        if (!confirm('이 영상을 삭제할까요?')) return;
        const res = await fetch(`/api/admin/videos/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
            document.getElementById('vrow-' + id)?.remove();
            const count = document.querySelectorAll('[id^="vrow-"]').length;
            document.getElementById('videoCount').textContent = `총 ${count}개`;
        } else {
            alert(data.message || '삭제 실패');
        }
    }

    async function deleteUser(id, username) {
        if (!confirm(`'${username}' 계정과 해당 계정의 영상을 모두 삭제할까요?`)) return;
        const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
            document.getElementById('urow-' + id)?.remove();
            const count = document.querySelectorAll('[id^="urow-"]').length;
            document.getElementById('userCount').textContent = `총 ${count}명`;
            loadVideos(); // 영상 목록 새로고침
        } else {
            alert(data.message || '삭제 실패');
        }
    }

    init();
</script>
</body>
</html>
