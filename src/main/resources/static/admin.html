<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 패널</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="style.css?v=4" />
    <script src="auth.js"></script>
    <style>
        body { background: #0f0f0f; color: #f1f1f1; }

        .admin-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px 60px;
        }

        .admin-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #fff;
        }

        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid #272727;
            padding-bottom: 0;
        }

        .tab-btn {
            padding: 8px 18px 10px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .tab-btn.active {
            color: #fff;
            border-bottom-color: #fff;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 10px 12px;
            background: #181818;
            color: #aaa;
            font-weight: 600;
            border-bottom: 1px solid #272727;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #1e1e1e;
            vertical-align: middle;
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tr:hover td { background: #161616; }

        .btn-del {
            padding: 4px 12px;
            background: #c00;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-del:hover { background: #e00; }

        .btn-role {
            padding: 4px 10px;
            background: #333;
            color: #aaa;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-role:hover { background: #444; }
        .btn-role.btn-role-admin {
            background: #2d1f6e;
            color: #a78bfa;
            border-color: #4c3a9e;
        }
        .btn-role.btn-role-admin:hover { background: #3b2a8a; }

        .btn-action {
            padding: 6px 14px;
            background: #272727;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-action:hover { background: #333; }
        .btn-action.danger { background: #c00; }
        .btn-action.danger:hover { background: #e00; }

        .broken-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .broken-badge {
            font-size: 12px;
            color: #e55;
            background: #2a1515;
            border: 1px solid #5a2020;
            border-radius: 6px;
            padding: 3px 10px;
        }

        .count-badge {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 12px;
        }

        .empty-msg {
            padding: 40px;
            text-align: center;
            color: #555;
            font-size: 14px;
        }

        #authWall {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            font-size: 15px;
            color: #888;
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="topbar-left">
        <a href="index.html" class="logo-wrap" aria-label="MyTube 홈">
            <span class="logo-badge">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
                    <rect x="4" y="7" width="16" height="10" rx="2" stroke="white" stroke-width="1.4"/>
                    <rect x="2" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="2" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <path d="M10.5 10l4 2-4 2v-4z" fill="white"/>
                </svg>
            </span>
            <span class="logo-text">MY</span>
        </a>
    </div>
    <div class="topbar-center"></div>
    <div class="topbar-right" id="headerRight"></div>
</header>

<div id="authWall">확인 중...</div>

<div class="admin-wrap" id="adminContent" style="display:none">
    <div class="admin-title">관리자 패널</div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('videos')">영상 관리</button>
        <button class="tab-btn" onclick="switchTab('users')">회원 관리</button>
    </div>

    <!-- 영상 관리 -->
    <div class="tab-panel active" id="tab-videos">
        <div class="count-badge" id="videoCount"></div>
        <div id="videoTableWrap"></div>

        <!-- 해상도 일괄 변환 -->
        <div style="margin-top:32px; border-top:1px solid #272727; padding-top:24px;">
            <div style="font-size:15px; font-weight:700; color:#fff; margin-bottom:8px;">해상도 일괄 변환</div>
            <div style="font-size:13px; color:#888; margin-bottom:14px;">1080p, 720p, 480p, 360p 변환이 안 된 영상을 백그라운드에서 일괄 변환해.</div>
            <div class="broken-toolbar">
                <button class="btn-action" onclick="generateResolutions()">해상도 일괄 변환 시작</button>
                <span id="genResStatus" style="color:#888; font-size:13px;"></span>
            </div>
        </div>

        <!-- MinIO 마이그레이션 -->
        <div style="margin-top:32px; border-top:1px solid #272727; padding-top:24px;">
            <div style="font-size:15px; font-weight:700; color:#fff; margin-bottom:8px;">MinIO 마이그레이션</div>
            <div style="font-size:13px; color:#888; margin-bottom:14px;">로컬 서버에 저장된 영상/썸네일을 MinIO로 이전해.</div>
            <div class="broken-toolbar">
                <button class="btn-action" onclick="migrateToMinio()">MinIO 마이그레이션 시작</button>
                <span id="migrateMinioStatus" style="color:#888; font-size:13px;"></span>
            </div>
        </div>

        <!-- 재생 불가 영상 -->
        <div style="margin-top:32px; border-top:1px solid #272727; padding-top:24px;">
            <div style="font-size:15px; font-weight:700; color:#fff; margin-bottom:14px;">재생 불가 영상 관리</div>
            <div class="broken-toolbar">
                <button class="btn-action" onclick="scanBroken()">재생 불가 영상 검색</button>
                <span id="brokenStatus" style="color:#888; font-size:13px;"></span>
            </div>
            <div id="brokenWrap" style="display:none;">
                <div class="broken-toolbar">
                    <button class="btn-action" onclick="toggleAllBroken()">전체 선택 / 해제</button>
                    <button class="btn-action danger" onclick="deleteBrokenSelected()">선택 삭제</button>
                    <span id="brokenSelectedCount" class="broken-badge" style="display:none;"></span>
                </div>
                <div id="brokenTableWrap"></div>
            </div>
        </div>
    </div>

    <!-- 회원 관리 -->
    <div class="tab-panel" id="tab-users">
        <div class="count-badge" id="userCount"></div>
        <div id="userTableWrap"></div>
    </div>
</div>

<script>
    let currentTab = 'videos';

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach((btn, i) => {
            btn.classList.toggle('active', ['videos', 'users'][i] === tab);
        });
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
    }

    async function loadVideos() {
        const res = await fetch('/api/admin/videos');
        const videos = await res.json();
        document.getElementById('videoCount').textContent = `총 ${videos.length}개`;

        if (videos.length === 0) {
            document.getElementById('videoTableWrap').innerHTML = '<div class="empty-msg">영상이 없습니다.</div>';
            return;
        }

        const rows = videos.map(v => {
            const thumb = v.thumbnail
                ? `<img src="${v.thumbnail}" style="width:80px;height:45px;object-fit:cover;border-radius:4px;vertical-align:middle">`
                : `<div style="width:80px;height:45px;background:#222;border-radius:4px;display:inline-block"></div>`;
            return `
            <tr id="vrow-${v.id}">
                <td style="color:#888;width:40px">${v.id}</td>
                <td style="width:90px">${thumb}</td>
                <td title="${v.title}" style="max-width:200px">${v.title}</td>
                <td>${v.channel}</td>
                <td style="color:#888">${v.category}</td>
                <td style="color:#888">${v.visibility}</td>
                <td><button class="btn-del" onclick="deleteVideo(${v.id})">삭제</button></td>
            </tr>`;
        }).join('');

        document.getElementById('videoTableWrap').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>썸네일</th><th>제목</th><th>채널</th>
                        <th>카테고리</th><th>공개</th><th></th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    async function loadUsers() {
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        document.getElementById('userCount').textContent = `총 ${users.length}명`;

        if (users.length === 0) {
            document.getElementById('userTableWrap').innerHTML = '<div class="empty-msg">회원이 없습니다.</div>';
            return;
        }

        const rows = users.map(u => {
            const isAdmin = u.role === 'ADMIN';
            const roleBtn = `<button class="btn-role ${isAdmin ? 'btn-role-admin' : ''}" onclick="toggleRole(${u.id}, '${u.username}', '${u.role}')">${isAdmin ? '관리자' : '일반'}</button>`;
            const delBtn = isAdmin ? '' : `<button class="btn-del" onclick="deleteUser(${u.id}, '${u.username}')">삭제</button>`;
            return `
            <tr id="urow-${u.id}">
                <td style="color:#888;width:48px">${u.id}</td>
                <td>${u.username}</td>
                <td>${u.nickname}</td>
                <td>${u.channelName}</td>
                <td style="color:#888">${u.email}</td>
                <td>${roleBtn}</td>
                <td>${delBtn}</td>
            </tr>`;
        }).join('');

        document.getElementById('userTableWrap').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>아이디</th><th>닉네임</th>
                        <th>채널명</th><th>이메일</th><th>권한</th><th></th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    async function deleteVideo(id) {
        if (!confirm('이 영상을 삭제할까요?')) return;
        const res = await fetch(`/api/admin/videos/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
            document.getElementById('vrow-' + id)?.remove();
            const count = document.querySelectorAll('[id^="vrow-"]').length;
            document.getElementById('videoCount').textContent = `총 ${count}개`;
        } else {
            alert(data.message || '삭제 실패');
        }
    }

    let genResTimer = null;
    let genResErrCount = 0;

    async function checkGenResStatus() {
        const status = document.getElementById('genResStatus');
        try {
            const res = await fetch('/api/admin/generate-resolutions/status');
            if (!res.ok) throw new Error('server error');
            const data = await res.json();
            genResErrCount = 0;
            if (data.pending === 0) {
                clearInterval(genResTimer);
                genResTimer = null;
                if (data.total > 0) {
                    status.style.color = '#7ce59a';
                    status.textContent = `완료! 전체 ${data.total}개 영상 모두 변환됨`;
                }
            } else {
                status.style.color = '#f1c40f';
                status.textContent = `변환 중... ${data.done}/${data.total}개 완료 (${data.pending}개 남음)`;
                if (!genResTimer) {
                    genResTimer = setInterval(checkGenResStatus, 5000);
                }
            }
        } catch {
            genResErrCount++;
            if (genResErrCount >= 5) {
                clearInterval(genResTimer);
                genResTimer = null;
                genResErrCount = 0;
            }
        }
    }

    checkGenResStatus();

    async function generateResolutions() {
        const btn = event.target;
        const status = document.getElementById('genResStatus');
        btn.disabled = true;
        status.style.color = '#888';
        status.textContent = '요청 중...';
        try {
            const res = await fetch('/api/admin/generate-resolutions', { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                if (data.queued === 0) {
                    status.style.color = '#7ce59a';
                    status.textContent = '모든 영상이 이미 변환되어 있어.';
                } else {
                    status.style.color = '#f1c40f';
                    status.textContent = `${data.queued}개 변환 시작됨 — 진행 중...`;
                    if (genResTimer) clearInterval(genResTimer);
                    genResTimer = setInterval(checkGenResStatus, 5000);
                }
            } else {
                status.style.color = '#e55';
                status.textContent = data.message || '실패';
            }
        } catch {
            status.style.color = '#e55';
            status.textContent = '요청 실패';
        }
        btn.disabled = false;
    }

    let migrateMinioTimer = null;

    async function checkMigrateMinioStatus() {
        const status = document.getElementById('migrateMinioStatus');
        try {
            const res = await fetch('/api/admin/migrate-to-minio/status');
            const data = await res.json();
            if (data.local === 0) {
                clearInterval(migrateMinioTimer);
                migrateMinioTimer = null;
                status.style.color = '#7ce59a';
                status.textContent = `완료! 전체 ${data.total}개 영상 모두 MinIO로 이전됨`;
            } else {
                status.style.color = '#f1c40f';
                status.textContent = `이전 중... ${data.minio}/${data.total}개 완료 (${data.local}개 남음)`;
            }
        } catch { /* ignore */ }
    }

    async function migrateToMinio() {
        const btn = event.target;
        const status = document.getElementById('migrateMinioStatus');
        btn.disabled = true;
        status.style.color = '#888';
        status.textContent = '요청 중...';
        try {
            const res = await fetch('/api/admin/migrate-to-minio', { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                if (data.queued === 0) {
                    status.style.color = '#7ce59a';
                    status.textContent = '이전할 영상이 없어. 모두 MinIO에 있어.';
                } else {
                    status.style.color = '#f1c40f';
                    status.textContent = `${data.queued}개 이전 시작됨 — 진행 중...`;
                    if (migrateMinioTimer) clearInterval(migrateMinioTimer);
                    migrateMinioTimer = setInterval(checkMigrateMinioStatus, 5000);
                }
            } else {
                status.style.color = '#e55';
                status.textContent = data.message || '실패';
            }
        } catch {
            status.style.color = '#e55';
            status.textContent = '요청 실패';
        }
        btn.disabled = false;
    }

    let brokenVideos = [];

    async function scanBroken() {
        document.getElementById('brokenStatus').textContent = '검색 중...';
        document.getElementById('brokenWrap').style.display = 'none';
        try {
            const res = await fetch('/api/admin/videos/broken');
            brokenVideos = await res.json();
        } catch {
            document.getElementById('brokenStatus').textContent = '검색 실패';
            return;
        }

        if (brokenVideos.length === 0) {
            document.getElementById('brokenStatus').textContent = '재생 불가 영상 없음';
            return;
        }

        document.getElementById('brokenStatus').textContent = `${brokenVideos.length}개 발견`;
        document.getElementById('brokenWrap').style.display = 'block';
        renderBrokenTable();
    }

    function renderBrokenTable() {
        const rows = brokenVideos.map(v => `
            <tr id="brow-${v.id}">
                <td style="width:32px"><input type="checkbox" class="broken-check" data-id="${v.id}" onchange="updateBrokenCount()"></td>
                <td style="color:#888;width:40px">${v.id}</td>
                <td title="${v.title}">${v.title}</td>
                <td>${v.channel}</td>
                <td style="color:#e55; font-size:12px;">${v.reason}</td>
                <td><button class="btn-del" onclick="deleteVideo(${v.id}); removeBrokenRow(${v.id})">삭제</button></td>
            </tr>`).join('');

        document.getElementById('brokenTableWrap').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th style="width:32px"></th>
                        <th>ID</th><th>제목</th><th>채널</th><th>원인</th><th></th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
        updateBrokenCount();
    }

    function updateBrokenCount() {
        const checked = document.querySelectorAll('.broken-check:checked').length;
        const badge = document.getElementById('brokenSelectedCount');
        if (checked > 0) {
            badge.style.display = 'inline';
            badge.textContent = `${checked}개 선택됨`;
        } else {
            badge.style.display = 'none';
        }
    }

    function toggleAllBroken() {
        const checks = document.querySelectorAll('.broken-check');
        const allChecked = [...checks].every(c => c.checked);
        checks.forEach(c => c.checked = !allChecked);
        updateBrokenCount();
    }

    function removeBrokenRow(id) {
        document.getElementById('brow-' + id)?.remove();
        brokenVideos = brokenVideos.filter(v => v.id !== id);
        document.getElementById('brokenStatus').textContent = `${brokenVideos.length}개 발견`;
        updateBrokenCount();
    }

    async function deleteBrokenSelected() {
        const ids = [...document.querySelectorAll('.broken-check:checked')].map(c => parseInt(c.dataset.id));
        if (ids.length === 0) { alert('삭제할 영상을 선택해줘.'); return; }
        if (!confirm(`선택한 ${ids.length}개 영상을 삭제할까요?`)) return;

        const res = await fetch('/api/admin/videos/bulk-delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids })
        });
        const data = await res.json();
        if (data.success) {
            ids.forEach(id => removeBrokenRow(id));
            loadVideos();
        } else {
            alert(data.message || '삭제 실패');
        }
    }

    async function toggleRole(id, username, currentRole) {
        const newRole = currentRole === 'ADMIN' ? 'USER' : 'ADMIN';
        const label = newRole === 'ADMIN' ? '관리자로 승격' : '일반 유저로 변경';
        if (!confirm(`'${username}'을(를) ${label}할까요?`)) return;
        const res = await fetch(`/api/admin/users/${id}/role`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ role: newRole })
        });
        const data = await res.json();
        if (data.success) {
            loadUsers();
        } else {
            alert(data.message || '변경 실패');
        }
    }

    async function deleteUser(id, username) {
        if (!confirm(`'${username}' 계정과 해당 계정의 영상을 모두 삭제할까요?`)) return;
        const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
            document.getElementById('urow-' + id)?.remove();
            const count = document.querySelectorAll('[id^="urow-"]').length;
            document.getElementById('userCount').textContent = `총 ${count}명`;
            loadVideos(); // 영상 목록 새로고침
        } else {
            alert(data.message || '삭제 실패');
        }
    }

    window.__AUTH_READY__.then(me => {
        if (!me.loggedIn) {
            window.location.href = 'login.html?next=admin.html';
            return;
        }
        if (me.user?.username !== 'admin') {
            document.getElementById('authWall').textContent = '관리자 계정으로 로그인해야 합니다.';
            return;
        }
        document.getElementById('authWall').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        loadVideos();
        loadUsers();
    });
</script>
</body>
</html>
