<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube - 시청</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet"
    />
    <script src="theme.js"></script>
    <link rel="stylesheet" href="style.css?v=7" />

    <style>
        .watch-shell {
            display: flex;
            min-height: calc(100vh - 56px);
        }

        /* 시청 페이지는 유튜브처럼 좌측 내비게이션을 기본적으로 숨기고, 메뉴 버튼으로 여는 오버레이로 표시 */
        .sidebar {
            width: 240px;
            background: #0f0f0f;
            border-right: 1px solid #222;
            padding: 12px 10px;
            position: fixed;
            top: 56px;
            left: 0;
            height: calc(100vh - 56px);
            overflow-y: auto;
            z-index: 120;
            transform: translateX(-100%);
            box-shadow: 12px 0 30px rgba(0, 0, 0, 0.35);
            transition: transform 0.22s ease;
        }

        .sidebar.is-open {
            transform: translateX(0);
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 16px;
            min-height: 40px;
            padding: 0 12px;
            border-radius: 10px;
            color: #f1f1f1;
            transition: background 0.18s ease;
        }

        .sidebar-link:hover {
            background: #222;
        }

        .sidebar-link.is-active {
            background: #272727;
            font-weight: 700;
        }

        .sidebar-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .sidebar-label {
            font-size: 14px;
            white-space: nowrap;
        }

        .watch-content {
            flex: 1;
            min-width: 0;
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .menu-btn:hover {
            background: #222;
        }

        .menu-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .topbar-left {
            gap: 4px;
        }

        .mobile-sidebar-backdrop {
            position: fixed;
            inset: 56px 0 0 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 110;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .mobile-sidebar-backdrop.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        .watch-layout {
            align-items: start;
        }

        .watch-main-column {
            min-width: 0;
        }

        .watch-side-column {
            min-width: 0;
            position: sticky;
            top: 72px;
        }

        .watch-recommend-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
            padding: 0 4px;
        }

        .watch-recommend-title {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            color: #f1f1f1;
        }

        .watch-recommend-sub {
            margin: 0;
            font-size: 12px;
            color: #9aa0a6;
        }

        .watch-recommend-chipbar,
        .watch-recommend-nav {
            display: none;
        }

        .recommend-chip {
            flex-shrink: 0;
            height: 32px;
            padding: 0 14px;
            border-radius: 999px;
            border: none;
            background: #272727;
            color: #f1f1f1;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }

        .recommend-chip:hover {
            background: #3f3f3f;
        }

        .recommend-chip.is-active {
            background: #f1f1f1;
            color: #0f0f0f;
            font-weight: 700;
        }

        .recommend-nav-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 999px;
            background: #272727;
            color: #f1f1f1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
        }

        .recommend-nav-btn:hover {
            background: #3f3f3f;
        }

        .recommend-nav-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .watch-recommend-panel {
            background: #121212;
            border: 1px solid #232323;
            border-radius: 18px;
            padding: 10px 8px;
        }

        #watchPlaylistPanel { border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
        .watch-pl-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #1a1a1a; }
        .watch-pl-title { font-size: 13px; font-weight: 700; color: #f1f1f1; text-decoration: none; }
        .watch-pl-title:hover { text-decoration: underline; }
        .watch-pl-pos { font-size: 12px; color: #aaa; }
        .watch-pl-list { max-height: 320px; overflow-y: auto; background: #1a1a1a; padding: 4px 6px; }
        .watch-pl-item { display: flex; gap: 8px; padding: 6px; text-decoration: none; color: inherit; border-radius: 8px; }
        .watch-pl-item:hover { background: #272727; }
        .watch-pl-item.is-active { background: #272727; }
        .watch-pl-thumb { width: 80px; flex-shrink: 0; aspect-ratio: 16/9; border-radius: 4px; overflow: hidden; position: relative; background: #000; }
        .watch-pl-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .watch-pl-now, .watch-pl-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; }
        .watch-pl-now { background: rgba(0,0,0,.6); color: #ff4444; font-size: 14px; }
        .watch-pl-num { color: #bbb; }
        .watch-pl-info { flex: 1; min-width: 0; }
        .watch-pl-item-title { font-size: 12px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #f1f1f1; }
        .watch-pl-item-ch { font-size: 11px; color: #aaa; margin-top: 2px; }
        html[data-theme="light"] .watch-pl-header, html[data-theme="light"] .watch-pl-list { background: #f0f0f0; }
        html[data-theme="light"] .watch-pl-item:hover, html[data-theme="light"] .watch-pl-item.is-active { background: #e0e0e0; }
        html[data-theme="light"] .watch-pl-item-title { color: #0f0f0f; }

        @media (max-width: 900px) {
            .watch-side-column {
                position: static;
            }
        }
    </style>
</head>
<body data-page="watch">
<header class="topbar">
    <div class="topbar-left">
        <button type="button" class="menu-btn" id="menuToggle" aria-label="메뉴 열기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18v2H3V6Zm0 5h18v2H3v-2Zm0 5h18v2H3v-2Z"></path>
            </svg>
        </button>

        <a href="index.html" class="logo-wrap" aria-label="MyTube 홈">
            <span class="logo-badge">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
                    <rect x="4" y="7" width="16" height="10" rx="2" stroke="white" stroke-width="1.4"/>
                    <rect x="2" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="2" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <path d="M10.5 10l4 2-4 2v-4z" fill="white"/>
                </svg>
            </span>
            <span class="logo-text">MY</span>
        </a>
    </div>

    <div class="topbar-center">
        <form class="search-form" onsubmit="return false;">
            <input type="text" placeholder="검색" aria-label="검색" />
            <button type="submit" class="search-btn" aria-label="검색 버튼">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10 4a6 6 0 1 0 3.87 10.58l4.27 4.27 1.41-1.41-4.27-4.27A6 6 0 0 0 10 4Zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"></path>
                </svg>
            </button>
        </form>
    </div>

    <div class="topbar-right">
        <a href="upload.html" class="icon-btn" aria-label="업로드">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M11 6h2v5h5v2h-5v5h-2v-5H6v-2h5V6Z"></path>
            </svg>
        </a>
        <div class="notif-wrap" id="notifWrap">
            <button class="icon-btn notif-btn" id="notifBtn" aria-label="알림">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6v-5a7 7 0 1 0-14 0v5l-2 2v1h18v-1l-2-2Z"/></svg>
                <span class="notif-badge" id="notifBadge" style="display:none"></span>
            </button>
            <div class="notif-dropdown" id="notifDropdown" style="display:none">
                <div class="notif-header"><span>알림</span><button class="notif-read-all" id="notifReadAll">모두 읽음</button></div>
                <div class="notif-list" id="notifList"></div>
            </div>
        </div>
        <a href="channel.html" class="profile" aria-label="내 채널">T</a>
    </div>
</header>

<div class="mobile-sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="watch-shell">
    <aside class="sidebar" id="sidebar">
        <nav class="sidebar-section">
            <a href="index.html" class="sidebar-link is-active">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 10.5 12 4l8 6.5V20h-5v-5h-6v5H4v-9.5Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">홈</span>
            </a>
        </nav>

        <nav class="sidebar-section">
            <a href="saved.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M17 3H7a2 2 0 0 0-2 2v16l7-4 7 4V5a2 2 0 0 0-2-2Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">저장한 영상</span>
            </a>

            <a href="liked.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m12 21-1.45-1.32C5.4 15.05 2 11.97 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09A6 6 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.47-3.4 6.55-8.55 11.18L12 21Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">좋아요한 영상</span>
            </a>
            <a href="history.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m12 21-1.45-1.32C5.4 15.05 2 11.97 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09A6 6 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.47-3.4 6.55-8.55 11.18L12 21Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">시청 기록</span>
            </a>
        </nav>

        <nav class="sidebar-section">
            <a href="channel.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">내 채널</span>
            </a>

            <a href="studio.html" class="sidebar-link">
                <span class="sidebar-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg></span>
                <span class="sidebar-label">내 스튜디오</span>
            </a>

            <a href="upload.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M11 6h2v5h5v2h-5v5h-2v-5H6v-2h5V6Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">업로드</span>
            </a>
        </nav>
    </aside>

    <main class="watch-page watch-content">
        <div class="watch-layout">
            <section class="watch-main-column" id="watchMain"></section>

            <aside class="watch-side-column">
                <div id="watchPlaylistPanel" style="display:none;"></div>
                <div class="watch-recommend-header">
                    <div class="watch-recommend-header-default">
                        <h3 class="watch-recommend-title">추천 영상</h3>
                        <p class="watch-recommend-sub">지금 보는 영상과 비슷한 콘텐츠</p>
                    </div>

                    <div class="watch-recommend-chipbar" id="watchRecommendChipbar">
                        <button class="recommend-chip is-active" data-filter="all" type="button">모두</button>
                        <button class="recommend-chip" data-filter="channel" type="button" id="watchRecommendChannelChip"></button>
                    </div>

                    <div class="watch-recommend-nav">
                        <button class="recommend-nav-btn" id="watchRecommendPrev" type="button" aria-label="이전 영상 보기">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.71 6.71a.996.996 0 0 0-1.41 0L8.71 11.3a.996.996 0 0 0 0 1.41l4.59 4.59a.996.996 0 1 0 1.41-1.41L10.83 12l3.88-3.88c.39-.39.38-1.03 0-1.41z"></path></svg>
                        </button>
                        <button class="recommend-nav-btn" id="watchRecommendNext" type="button" aria-label="다음 영상 보기">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.29 6.71a.996.996 0 0 0 0 1.41L13.17 12l-3.88 3.88a.996.996 0 1 0 1.41 1.41l4.59-4.59a.996.996 0 0 0 0-1.41L10.7 6.7c-.38-.38-1.02-.38-1.41.01z"></path></svg>
                        </button>
                    </div>
                </div>

                <div class="watch-recommend-panel">
                    <div class="watch-recommend-list" id="watchRecommendList"></div>
                </div>
            </aside>
        </div>
    </main>
</div>

<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
<script src="auth.js?v=12"></script>
<script src="js/common.js?v=34"></script>
<script src="js/components.js?v=34"></script>
<script src="js/notifications.js?v=34"></script>
<script src="js/sidebar.js?v=34"></script>
<script src="js/pages/watch.js?v=34"></script>
<script src="js/router.js?v=34"></script>
<script>
    (function () {
        const sidebar = document.getElementById("sidebar");
        const menuToggle = document.getElementById("menuToggle");
        const backdrop = document.getElementById("sidebarBackdrop");

        if (!sidebar || !menuToggle || !backdrop) return;

        function closeSidebar() {
            sidebar.classList.remove("is-open");
            backdrop.classList.remove("is-open");
        }

        menuToggle.addEventListener("click", () => {
            sidebar.classList.toggle("is-open");
            backdrop.classList.toggle("is-open");
        });

        backdrop.addEventListener("click", closeSidebar);
    })();
</script>
</body>
</html>
