<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="style.css?v=2" />
    <style>
        .auth-page {
            min-height: calc(100vh - 56px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            background: linear-gradient(180deg, #181818 0%, #141414 100%);
            border: 1px solid #272727;
            border-radius: 24px;
            padding: 28px;
        }

        .auth-title {
            margin: 0 0 10px;
            font-size: 30px;
            color: #fff;
        }

        .auth-subtitle {
            margin: 0 0 24px;
            color: #a9a9a9;
            line-height: 1.6;
            font-size: 14px;
        }

        .auth-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .auth-field label {
            font-size: 14px;
            color: #f1f1f1;
        }

        .auth-input {
            width: 100%;
            height: 46px;
            border: 1px solid #303030;
            background: #101010;
            color: #fff;
            border-radius: 14px;
            padding: 0 14px;
            outline: none;
        }

        .auth-input.is-invalid {
            border-color: #a33a3a;
        }

        .auth-error {
            min-height: 20px;
            color: #ff7b7b;
            font-size: 13px;
            line-height: 1.5;
        }

        .auth-submit {
            width: 100%;
            height: 44px;
            border: 1px solid #fff;
            background: #fff;
            color: #111;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
        }

        .auth-footer {
            margin-top: 18px;
            text-align: center;
            color: #aaaaaa;
            font-size: 14px;
        }

        .auth-footer a {
            color: #fff;
            font-weight: 700;
        }
    </style>
</head>
<body data-page="login">
<header class="topbar">
    <div class="topbar-left">
        <a href="index.html" class="logo-wrap" aria-label="MyTube 홈">
            <span class="logo-badge">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
                    <rect x="4" y="7" width="16" height="10" rx="2" stroke="white" stroke-width="1.4"/>
                    <rect x="2" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="2" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <path d="M10.5 10l4 2-4 2v-4z" fill="white"/>
                </svg>
            </span>
            <span class="logo-text">MY</span>
        </a>
    </div>
    <div class="topbar-center"></div>
    <div class="topbar-right"></div>
</header>

<main class="auth-page">
    <section class="auth-card">
        <h1 class="auth-title">로그인</h1>
        <p class="auth-subtitle">가입한 아이디와 비밀번호로 로그인해줘.</p>

        <form id="loginForm" novalidate>
            <div class="auth-field">
                <label for="loginUsername">아이디</label>
                <input type="text" id="loginUsername" class="auth-input" maxlength="20" />
                <div class="auth-error" id="loginUsernameError"></div>
            </div>

            <div class="auth-field">
                <label for="loginPassword">비밀번호</label>
                <input type="password" id="loginPassword" class="auth-input" maxlength="50" />
                <div class="auth-error" id="loginPasswordError"></div>
            </div>

            <div class="auth-error" id="loginCommonError"></div>

            <button type="submit" class="auth-submit">로그인</button>
        </form>

        <p class="auth-footer">
            비밀번호가 기억 안 나? <a href="forgot-password.html">비밀번호 찾기</a>
        </p>
        <p class="auth-footer" style="margin-top:8px">
            아직 회원이 아니면 <a href="signup.html">회원가입</a>
        </p>
    </section>
</main>

<script src="auth.js?v=11"></script>
</body>
</html>
