<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 찾기</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="style.css?v=4" />
    <style>
        .auth-page {
            min-height: calc(100vh - 56px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            background: linear-gradient(180deg, #181818 0%, #141414 100%);
            border: 1px solid #272727;
            border-radius: 24px;
            padding: 28px;
        }

        .auth-title {
            margin: 0 0 10px;
            font-size: 30px;
            color: #fff;
        }

        .auth-subtitle {
            margin: 0 0 24px;
            color: #a9a9a9;
            line-height: 1.6;
            font-size: 14px;
        }

        .auth-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .auth-field label {
            font-size: 14px;
            color: #f1f1f1;
        }

        .auth-input {
            width: 100%;
            height: 46px;
            border: 1px solid #303030;
            background: #101010;
            color: #fff;
            border-radius: 14px;
            padding: 0 14px;
            outline: none;
            box-sizing: border-box;
        }

        .auth-input.is-invalid {
            border-color: #a33a3a;
        }

        .auth-error {
            min-height: 20px;
            color: #ff7b7b;
            font-size: 13px;
            line-height: 1.5;
        }

        .auth-success {
            min-height: 20px;
            color: #4caf50;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .auth-submit {
            width: 100%;
            height: 44px;
            border: 1px solid #fff;
            background: #fff;
            color: #111;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            font-size: 15px;
        }

        .auth-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .auth-footer {
            margin-top: 18px;
            text-align: center;
            color: #aaaaaa;
            font-size: 14px;
        }

        .auth-footer a {
            color: #fff;
            font-weight: 700;
        }

        .step { transition: opacity 0.2s; }
        .step[hidden] { display: none; }

        .step-indicator {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
        }

        .step-dot.active {
            background: #fff;
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="topbar-left">
        <a href="index.html" class="logo-wrap" aria-label="MyTube 홈">
            <span class="logo-badge">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
                    <rect x="4" y="7" width="16" height="10" rx="2" stroke="white" stroke-width="1.4"/>
                    <rect x="2" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="2" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <path d="M10.5 10l4 2-4 2v-4z" fill="white"/>
                </svg>
            </span>
            <span class="logo-text">MY</span>
        </a>
    </div>
    <div class="topbar-center"></div>
    <div class="topbar-right"></div>
</header>

<main class="auth-page">
    <section class="auth-card">

        <div class="step-indicator">
            <div class="step-dot active" id="dot1"></div>
            <div class="step-dot" id="dot2"></div>
        </div>

        <!-- Step 1: 본인 확인 -->
        <div class="step" id="step1">
            <h1 class="auth-title">비밀번호 찾기</h1>
            <p class="auth-subtitle">가입할 때 사용한 아이디와 이메일을 입력해줘.</p>

            <form id="verifyForm" novalidate>
                <div class="auth-field">
                    <label for="fpUsername">아이디</label>
                    <input type="text" id="fpUsername" class="auth-input" maxlength="20" autocomplete="username" />
                    <div class="auth-error" id="fpUsernameError"></div>
                </div>

                <div class="auth-field">
                    <label for="fpEmail">이메일</label>
                    <input type="email" id="fpEmail" class="auth-input" maxlength="100" autocomplete="email" />
                    <div class="auth-error" id="fpEmailError"></div>
                </div>

                <div class="auth-error" id="fpCommonError"></div>

                <button type="submit" class="auth-submit" id="verifyBtn">본인 확인</button>
            </form>

            <p class="auth-footer">
                기억났어? <a href="login.html">로그인으로 돌아가기</a>
            </p>
        </div>

        <!-- Step 2: 새 비밀번호 설정 -->
        <div class="step" id="step2" hidden>
            <h1 class="auth-title">새 비밀번호</h1>
            <p class="auth-subtitle">사용할 새 비밀번호를 입력해줘.</p>

            <form id="resetForm" novalidate>
                <div class="auth-field">
                    <label for="newPassword">새 비밀번호</label>
                    <input type="password" id="newPassword" class="auth-input" maxlength="50" autocomplete="new-password" />
                    <div class="auth-error" id="newPasswordError"></div>
                </div>

                <div class="auth-field">
                    <label for="confirmPassword">비밀번호 확인</label>
                    <input type="password" id="confirmPassword" class="auth-input" maxlength="50" autocomplete="new-password" />
                    <div class="auth-error" id="confirmPasswordError"></div>
                </div>

                <div class="auth-error" id="resetCommonError"></div>
                <div class="auth-success" id="resetSuccess"></div>

                <button type="submit" class="auth-submit" id="resetBtn">비밀번호 변경</button>
            </form>
        </div>

    </section>
</main>

<script>
    let resetToken = null;

    // URL에 토큰이 있으면 바로 step 2로
    const urlToken = new URLSearchParams(window.location.search).get('token');
    if (urlToken) {
        resetToken = urlToken;
        goToStep2();
    }

    // Step 1: 본인 확인
    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearErrors();

        const username = document.getElementById('fpUsername').value.trim();
        const email = document.getElementById('fpEmail').value.trim();

        let valid = true;
        if (!username) {
            showError('fpUsernameError', '아이디를 입력해줘.'); valid = false;
        }
        if (!email) {
            showError('fpEmailError', '이메일을 입력해줘.'); valid = false;
        }
        if (!valid) return;

        const btn = document.getElementById('verifyBtn');
        btn.disabled = true;
        btn.textContent = '확인 중...';

        try {
            const res = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('verifyForm').hidden = true;
                document.getElementById('fpCommonError').textContent = '';
                const successEl = document.createElement('p');
                successEl.style.cssText = 'color:#4caf50;text-align:center;margin-top:16px;line-height:1.6;';
                successEl.textContent = data.message;
                document.getElementById('step1').appendChild(successEl);
            } else {
                showError('fpCommonError', data.message || '일치하는 계정을 찾을 수 없어.');
            }
        } catch {
            showError('fpCommonError', '서버 연결에 실패했어. 잠시 후 다시 시도해줘.');
        } finally {
            btn.disabled = false;
            btn.textContent = '본인 확인';
        }
    });

    // Step 2: 비밀번호 재설정
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearErrors();

        const newPw = document.getElementById('newPassword').value.trim();
        const confirmPw = document.getElementById('confirmPassword').value.trim();

        let valid = true;
        if (!newPw) {
            showError('newPasswordError', '새 비밀번호를 입력해줘.'); valid = false;
        } else if (newPw.length < 4) {
            showError('newPasswordError', '비밀번호는 최소 4자 이상이어야 해.'); valid = false;
        }
        if (newPw && confirmPw && newPw !== confirmPw) {
            showError('confirmPasswordError', '비밀번호가 일치하지 않아.'); valid = false;
        }
        if (!valid) return;

        const btn = document.getElementById('resetBtn');
        btn.disabled = true;
        btn.textContent = '변경 중...';

        try {
            const res = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: resetToken, newPassword: newPw })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('resetSuccess').textContent = data.message;
                btn.textContent = '로그인하러 가기';
                btn.disabled = false;
                btn.onclick = () => { window.location.href = 'login.html'; };
                document.getElementById('resetForm').onsubmit = null;
            } else {
                showError('resetCommonError', data.message || '비밀번호 변경에 실패했어.');
                btn.disabled = false;
                btn.textContent = '비밀번호 변경';
                if (data.message && data.message.includes('만료')) {
                    setTimeout(() => { goToStep1(); }, 2000);
                }
            }
        } catch {
            showError('resetCommonError', '서버 연결에 실패했어. 잠시 후 다시 시도해줘.');
            btn.disabled = false;
            btn.textContent = '비밀번호 변경';
        }
    });

    function goToStep2() {
        document.getElementById('step1').hidden = true;
        document.getElementById('step2').hidden = false;
        document.getElementById('dot1').classList.remove('active');
        document.getElementById('dot2').classList.add('active');
        document.getElementById('newPassword').focus();
    }

    function goToStep1() {
        document.getElementById('step2').hidden = true;
        document.getElementById('step1').hidden = false;
        document.getElementById('dot2').classList.remove('active');
        document.getElementById('dot1').classList.add('active');
        resetToken = null;
        clearErrors();
    }

    function showError(id, msg) {
        document.getElementById(id).textContent = msg;
        const inputId = id.replace('Error', '');
        const input = document.getElementById(inputId);
        if (input) input.classList.add('is-invalid');
    }

    function clearErrors() {
        document.querySelectorAll('.auth-error').forEach(el => el.textContent = '');
        document.querySelectorAll('.auth-input').forEach(el => el.classList.remove('is-invalid'));
    }
</script>
</body>
</html>
